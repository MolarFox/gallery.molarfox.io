<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <link rel="stylesheet" href="/style.css">
    <meta http-equiv="refresh" content="0; url=https://www.google.com">
</head>
<body>
    <div class="container">
        <div class="redirect-container">
            <h1>Redirecting...</h1>
            <p class="redirect-message">You are being redirected to Google.</p>
            <div class="spinner"></div>
            <p>If you are not redirected automatically, <a href="https://www.google.com">click here</a>.</p>
        </div>
    </div>
</body>
</html>
